name: CI

on:
  push:
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Policy name drift (optional snapshot)
        run: npm run policies:drift

      - name: Production guardrails
        run: npm run guardrails
        env:
          NODE_ENV: production
          VITE_DEV_UNLOCK_ALL_FEATURES: "false"
          VITE_DEV_AUTO_LOGIN_EMAIL: ""
          VITE_DEV_AUTO_LOGIN_PASSWORD: ""

      - name: Build
        run: npm run build

      - name: Bundle budget (ST-012)
        run: npm run budget:bundle

      - name: Phase 0 audits
        run: npm run audit:phase0

      - name: Phase 12 audits
        run: npm run audit:phase12

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (smoke)
        run: npx playwright test

      - name: E2E (Phase 12 continuity)
        run: npx playwright test e2e/continuity.spec.ts
